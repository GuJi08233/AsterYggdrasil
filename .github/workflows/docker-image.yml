name: Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_dockerhub:
        description: Publish Docker Hub image in addition to GHCR
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY_IMAGE_GHCR: ghcr.io/${{ github.repository_owner }}/asteryggdrasil
  DOCKERHUB_IMAGE_NAME: asteryggdrasil
  TEMP_IMAGE_TAG: build-${{ github.run_id }}
  PUBLISH_DOCKERHUB: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_dockerhub == true }}

jobs:
  build:
    name: Build ${{ matrix.variant }} ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: default
            features: server,cli
            suffix: ""
            platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - variant: default
            features: server,cli
            suffix: ""
            platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
          - variant: metrics
            features: server,cli,metrics
            suffix: "-metrics"
            platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - variant: metrics
            features: server,cli,metrics
            suffix: "-metrics"
            platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate Docker Hub opt-in
        if: env.PUBLISH_DOCKERHUB == 'true'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets are required when publish_dockerhub is enabled." >&2
            exit 1
          fi

      - name: Login to Docker Hub
        if: env.PUBLISH_DOCKERHUB == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY_IMAGE_GHCR }}
          tags: |
            type=ref,event=tag,suffix=${{ matrix.suffix }}
            type=raw,value=latest${{ matrix.suffix }},enable=${{ !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'rc') }}
            type=raw,value=stable${{ matrix.suffix }},enable=${{ !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'rc') }}
            type=raw,value=edge${{ matrix.suffix }},enable=${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          labels: |
            org.opencontainers.image.title=AsterYggdrasil
            org.opencontainers.image.description=Reusable Rust + React service foundation for Aster projects
            org.opencontainers.image.vendor=AsterCommunity

      - name: Prepare image tags
        id: image-tags
        env:
          MATRIX_ARCH: ${{ matrix.arch }}
          MATRIX_VARIANT: ${{ matrix.variant }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          {
            echo 'tags<<EOF'
            echo "${REGISTRY_IMAGE_GHCR}:${TEMP_IMAGE_TAG}-${MATRIX_VARIANT}-${MATRIX_ARCH}"
            if [ "$PUBLISH_DOCKERHUB" = "true" ]; then
              echo "${DOCKERHUB_USERNAME}/${DOCKERHUB_IMAGE_NAME}:${TEMP_IMAGE_TAG}-${MATRIX_VARIANT}-${MATRIX_ARCH}"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=docker-image-${{ matrix.variant }}-${{ matrix.arch }}
            type=registry,ref=${{ env.REGISTRY_IMAGE_GHCR }}:buildcache-${{ matrix.variant }}-${{ matrix.arch }}
            type=registry,ref=${{ env.REGISTRY_IMAGE_GHCR }}:buildcache-${{ matrix.variant }}
          cache-to: |
            type=gha,mode=max,scope=docker-image-${{ matrix.variant }}-${{ matrix.arch }}
            type=registry,ref=${{ env.REGISTRY_IMAGE_GHCR }}:buildcache-${{ matrix.variant }}-${{ matrix.arch }},mode=max
          build-args: |
            CARGO_FEATURES=${{ matrix.features }}
          provenance: true
          sbom: true

  publish-manifest:
    name: Publish ${{ matrix.variant }} multi-arch manifest
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: default
            suffix: ""
          - variant: metrics
            suffix: "-metrics"

    steps:
      - name: Login to Docker Hub
        if: env.PUBLISH_DOCKERHUB == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Extract GHCR metadata
        id: meta-ghcr
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE_GHCR }}
          tags: |
            type=ref,event=tag,suffix=${{ matrix.suffix }}
            type=raw,value=latest${{ matrix.suffix }},enable=${{ !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'rc') }}
            type=raw,value=stable${{ matrix.suffix }},enable=${{ !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'rc') }}
            type=raw,value=edge${{ matrix.suffix }},enable=${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}

      - name: Extract Docker Hub metadata
        if: env.PUBLISH_DOCKERHUB == 'true'
        id: meta-dockerhub
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_IMAGE_NAME }}
          tags: |
            type=ref,event=tag,suffix=${{ matrix.suffix }}
            type=raw,value=latest${{ matrix.suffix }},enable=${{ !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'rc') }}
            type=raw,value=stable${{ matrix.suffix }},enable=${{ !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'rc') }}
            type=raw,value=edge${{ matrix.suffix }},enable=${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}

      - name: Create multi-arch manifests
        id: manifests
        env:
          GHCR_TAGS: ${{ steps.meta-ghcr.outputs.tags }}
          DOCKERHUB_TAGS: ${{ steps.meta-dockerhub.outputs.tags }}
          MATRIX_VARIANT: ${{ matrix.variant }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          create_manifest() {
            local tags="$1"
            local image="$2"
            local metadata_file="$3"
            local first_tag=""
            local tag
            local -a args=()

            while IFS= read -r tag; do
              if [ -n "$tag" ]; then
                args+=("-t" "$tag")
                if [ -z "$first_tag" ]; then
                  first_tag="$tag"
                fi
              fi
            done <<< "$tags"

            if [ "${#args[@]}" -eq 0 ]; then
              echo "No manifest tags generated for ${image}" >&2
              exit 1
            fi

            docker buildx imagetools create "${args[@]}" \
              --metadata-file "$metadata_file" \
              "${image}:${TEMP_IMAGE_TAG}-${MATRIX_VARIANT}-amd64" \
              "${image}:${TEMP_IMAGE_TAG}-${MATRIX_VARIANT}-arm64" >&2

            printf '%s\n' "$first_tag"
          }

          create_manifest "$GHCR_TAGS" "$REGISTRY_IMAGE_GHCR" /tmp/ghcr-manifest-metadata.json
          if [ "$PUBLISH_DOCKERHUB" = "true" ]; then
            create_manifest "$DOCKERHUB_TAGS" "${DOCKERHUB_USERNAME}/${DOCKERHUB_IMAGE_NAME}" /tmp/dockerhub-manifest-metadata.json
          fi

          GHCR_DIGEST="$(jq -r '."containerimage.descriptor".digest' /tmp/ghcr-manifest-metadata.json)"

          if [ -z "$GHCR_DIGEST" ] || [ "$GHCR_DIGEST" = "null" ]; then
            echo "Failed to read GHCR manifest digest" >&2
            exit 1
          fi

          if [ "$PUBLISH_DOCKERHUB" = "true" ]; then
            DOCKERHUB_DIGEST="$(jq -r '."containerimage.descriptor".digest' /tmp/dockerhub-manifest-metadata.json)"
            if [ -z "$DOCKERHUB_DIGEST" ] || [ "$DOCKERHUB_DIGEST" = "null" ]; then
              echo "Failed to read Docker Hub manifest digest" >&2
              exit 1
            fi
            echo "dockerhub_digest=${DOCKERHUB_DIGEST}" >> "$GITHUB_OUTPUT"
          fi

          echo "ghcr_digest=${GHCR_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Sign Docker images
        env:
          GHCR_DIGEST: ${{ steps.manifests.outputs.ghcr_digest }}
          DOCKERHUB_DIGEST: ${{ steps.manifests.outputs.dockerhub_digest }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          cosign sign --yes "${REGISTRY_IMAGE_GHCR}@${GHCR_DIGEST}"
          if [ "$PUBLISH_DOCKERHUB" = "true" ]; then
            cosign sign --yes "${DOCKERHUB_USERNAME}/${DOCKERHUB_IMAGE_NAME}@${DOCKERHUB_DIGEST}"
          fi
