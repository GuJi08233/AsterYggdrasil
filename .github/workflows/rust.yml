name: Rust CI

on:
  push:
    paths:
      - '**/*.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'scripts/coverage-summary.mjs'
      - '.github/workflows/rust.yml'
    branches: [master]
  pull_request:
    paths:
      - '**/*.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'scripts/coverage-summary.mjs'
      - '.github/workflows/rust.yml'
    branches: [master, develop]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --verbose

      - name: Format check
        run: cargo fmt -- --check

      - name: Prepare coverage output directory
        run: mkdir -p coverage/rust

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Run tests with coverage
        run: cargo llvm-cov --workspace --no-fail-fast --verbose --lcov --output-path coverage/rust/lcov.info

      - name: Generate HTML coverage report
        if: success()
        run: cargo llvm-cov report --html --output-dir coverage/rust/html

      - name: Publish coverage summary
        if: always() && hashFiles('coverage/rust/lcov.info') != ''
        run: bun scripts/coverage-summary.mjs "Rust" coverage/rust/lcov.info

      - name: Upload coverage reports to Codecov
        if: always() && hashFiles('coverage/rust/lcov.info') != ''
        uses: codecov/codecov-action@v7
        with:
          files: coverage/rust/lcov.info
          flags: rust
          name: rust-backend
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rust-coverage
          if-no-files-found: ignore
          path: coverage/rust

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  integration-backends:
    name: Integration tests (${{ matrix.backend }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [postgres, mysql]
    env:
      ASTER_TEST_DATABASE_BACKEND: ${{ matrix.backend }}
      # 复用 testcontainers 容器，测试间共享 Postgres/MySQL 实例
      TESTCONTAINERS_REUSE_ENABLED: "true"
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: integration-${{ matrix.backend }}
          shared-key: integration

      # testcontainers 使用的 Docker 在 ubuntu-latest 上预装
      - name: Verify Docker availability
        run: docker version

      # 只跑集成测试（tests/ 下的），单元测试已在 build job 中覆盖
      - name: Run integration tests against ${{ matrix.backend }}
        run: cargo test --tests --no-fail-fast --verbose
