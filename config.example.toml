# AsterYggdrasil static configuration example.
# The runtime default path is data/config.toml.
# Relative paths are resolved against data/ when the config file lives there.

[server]
host = "127.0.0.1"
port = 3000
workers = 0
temp_dir = ".tmp"
start_mode = "primary"

[server.follower]
managed_ingress_local_root = "managed-ingress"

[database]
url = "sqlite://asteryggdrasil.db?mode=rwc"
pool_size = 10
retry_count = 3

[auth]
jwt_secret = "replace-with-a-long-random-secret"
mfa_secret_key = "replace-with-another-long-random-secret"
bootstrap_insecure_cookies = false

[cache]
enabled = true
backend = "memory"
redis_url = ""
default_ttl = 3600

[object_storage]
backend = "local"
local_root = "storage"

[object_storage.s3]
endpoint = ""
region = ""
bucket = ""
base_path = ""
access_key_id = ""
secret_access_key = ""
force_path_style = false

[logging]
level = "info"
format = "text"
file = ""
enable_rotation = true
max_backups = 5

[network_trust]
trusted_proxies = []

[rate_limit]
enabled = true

[rate_limit.auth]
seconds_per_request = 2
burst_size = 5

[rate_limit.public]
seconds_per_request = 1
burst_size = 30

[rate_limit.api]
seconds_per_request = 1
burst_size = 120

[rate_limit.write]
seconds_per_request = 2
burst_size = 10
